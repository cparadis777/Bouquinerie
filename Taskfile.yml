version: '3'

vars:
  RUST_DIR: backend
  DB_DIR: backend/db
  FRONTEND_DIST: ../web/dist

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # -----------------------------------------
  # Database Tasks (SeaORM)
  # -----------------------------------------
  db:cli:
    desc: Install sea-orm-cli for code generation and migrations
    cmds:
      - cargo install sea-orm-cli

  db:entities:
    desc: Generate SeaORM entity files from the database schema
    dir: "{{.DB_DIR}}"
    cmds:
      - sea-orm-cli generate entity -u "$DATABASE_URL" -o src/entities --with-serde both --model-extra-derives 'utoipa::ToSchema'
    requires:
      vars: ["DATABASE_URL"]

  db:seed:
    desc: Seed the database with sample books, authors, and series
    dir: "{{.DB_DIR}}"
    cmds:
      - psql "$DATABASE_URL" -f seed.sql
    requires:
      vars: ["DATABASE_URL"]

  # -----------------------------------------
  # API Tasks
  # -----------------------------------------
  api:run:
    desc: Run the Rust API server
    dir: "{{.RUST_DIR}}/api"
    cmds:
      - cargo run --bin api

  # -----------------------------------------
  # Frontend Tasks (Vue + Vite)
  # -----------------------------------------
  frontend:install:
    desc: Install npm dependencies
    dir: web
    cmds:
      - npm install

  frontend:dev:
    desc: Start Vite dev server (proxies /api to Rust on :3000)
    dir: web
    cmds:
      - npm run dev

  frontend:build:
    desc: Build Vue app for production (outputs to web/dist/)
    dir: web
    cmds:
      - npm run build

  frontend:preview:
    desc: Preview the production build
    dir: web
    cmds:
      - npm run preview

  frontend:generate:api:
    desc: Generate TypeScript types from the running API's OpenAPI spec
    dir: web
    cmds:
      - npm run generate:api
    requires:
      vars: ["DATABASE_URL"]

  frontend:lint:
    desc: Run TypeScript type checking
    dir: web
    cmds:
      - npx vue-tsc -b --noEmit
