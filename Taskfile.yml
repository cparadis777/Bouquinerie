version: '3'

vars:
  FLUTTER_DIR: frontend
  RUST_DIR: backend
  DB_DIR: backend/db
  PORT: 8080

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list


  # -----------------------------------------
  # Database Tasks (SeaORM)
  # -----------------------------------------
  db:cli:
    desc: Install sea-orm-cli for code generation and migrations
    cmds:
      - cargo install sea-orm-cli

  db:entities:
    desc: Generate SeaORM entity files from the database schema
    dir: "{{.DB_DIR}}"
    cmds:
      - sea-orm-cli generate entity -u "$DATABASE_URL" -o src/entities --with-serde both --model-extra-derives 'utoipa::ToSchema'
    requires:
      vars: ["DATABASE_URL"]

  db:seed:
    desc: Seed the database with sample books, authors, and series
    dir: "{{.DB_DIR}}"
    cmds:
      - psql "$DATABASE_URL" -f seed.sql
    requires:
      vars: ["DATABASE_URL"]

  # -----------------------------------------
  # Frontend Tasks (Flutter)
  # -----------------------------------------

  frontend:build:
    desc: Build the Flutter web application for production
    dir: "{{.FLUTTER_DIR}}"
    cmds:
      - cd lib/api/generated && dart run build_runner build --delete-conflicting-outputs
      - flutter build web --release

  frontend:generate:
    desc: Regenerate Dart client from OpenAPI spec (requires running server)
    cmds:
      - curl -s http://localhost:3000/api-docs/openapi.json -o "{{.FLUTTER_DIR}}/openapi.json"
      - rm -rf "{{.FLUTTER_DIR}}/lib/api/generated"
      - >-
        java -jar /tmp/openapi-generator-cli.jar generate
        -i "{{.FLUTTER_DIR}}/openapi.json"
        -g dart-dio
        -o "{{.FLUTTER_DIR}}/lib/api/generated"
        --additional-properties=pubName=api_client,serializationLibrary=json_serializable
        --skip-validate-spec
      - "sed -i \"s/sdk: '>=3.5.0 <4.0.0'/sdk: '>=3.12.0 <4.0.0'/\" \"{{.FLUTTER_DIR}}/lib/api/generated/pubspec.yaml\""
      - cd "{{.FLUTTER_DIR}}/lib/api/generated" && flutter pub get && dart run build_runner build --delete-conflicting-outputs
