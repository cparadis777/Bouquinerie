version: '3'

vars:
  FLUTTER_DIR: frontend
  RUST_DIR: api
  PORT: 8080

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # -----------------------------------------
  # Backend Tasks (Rust)
  # -----------------------------------------
  backend:watch:
    desc: Run Rust backend with hot-reloading (requires cargo-watch)
    dir: "{{.RUST_DIR}}"
    cmds:
      - cargo watch -x run

  backend:build:
    desc: Build the Rust backend in release mode
    dir: "{{.RUST_DIR}}"
    cmds:
      - cargo build --release

  # -----------------------------------------
  # Frontend Tasks (Flutter)
  # -----------------------------------------
  frontend:dev:
    desc: Run Flutter web app in development mode
    dir: "{{.FLUTTER_DIR}}"
    cmds:
      - flutter run -d web-server --web-port={{.PORT}} --web-hostname=0.0.0.0

  frontend:build:
    desc: Build the Flutter web application for production
    dir: "{{.FLUTTER_DIR}}"
    cmds:
      - flutter build web --release

  # -----------------------------------------
  # Combined / Orchestration Tasks
  # -----------------------------------------
  dev:
    desc: Run both Backend and Frontend simultaneously
    deps:
      - backend:watch
      - frontend:dev