version: '3'

vars:
  FLUTTER_DIR: frontend
  RUST_DIR: backend
  DB_DIR: backend/db
  PORT: 8080

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list


  # -----------------------------------------
  # Database Tasks (SeaORM)
  # -----------------------------------------
  db:cli:
    desc: Install sea-orm-cli for code generation and migrations
    cmds:
      - cargo install sea-orm-cli

  db:entities:
    desc: Generate SeaORM entity files from the database schema
    dir: "{{.DB_DIR}}"
    cmds:
      - sea-orm-cli generate entity -u "$DATABASE_URL" -o src/entities --with-serde both --model-extra-derives 'utoipa::ToSchema'
    requires:
      vars: ["DATABASE_URL"]

  db:seed:
    desc: Seed the database with sample books, authors, and series
    dir: "{{.DB_DIR}}"
    cmds:
      - psql "$DATABASE_URL" -f seed.sql
    requires:
      vars: ["DATABASE_URL"]

  # -----------------------------------------
  # Frontend Tasks (Flutter)
  # -----------------------------------------

  frontend:build:
    desc: Build the Flutter web application for production
    dir: "{{.FLUTTER_DIR}}"
    cmds:
      - flutter build web --release
