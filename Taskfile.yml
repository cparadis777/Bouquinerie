version: '3'

vars:
  RUST_DIR: backend
  DB_DIR: backend/db
  DOMAIN_DIR: backend/domain
  FRONTEND_DIST: ../web/dist

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # -----------------------------------------
  # Database Tasks (SeaORM)
  # -----------------------------------------
  db:cli:
    desc: Install sea-orm-cli for code generation
    cmds:
      - cargo install sea-orm-cli

  db:migrate:
    desc: Apply pending migrations
    dir: "{{.DB_DIR}}"
    cmds:
      - cargo run --bin migrate up
    requires:
      vars: ["DATABASE_URL"]

  db:rollback:
    desc: Rollback the last migration
    dir: "{{.DB_DIR}}"
    cmds:
      - cargo run --bin migrate down
    requires:
      vars: ["DATABASE_URL"]

  db:reset:
    desc: Rollback all migrations then re-apply
    dir: "{{.DB_DIR}}"
    cmds:
      - cargo run --bin migrate reset
    requires:
      vars: ["DATABASE_URL"]

  db:fresh:
    desc: Drop all tables then re-apply all migrations
    dir: "{{.DB_DIR}}"
    cmds:
      - cargo run --bin migrate fresh
    requires:
      vars: ["DATABASE_URL"]

  db:entities:
    desc: Generate SeaORM entity files from the database schema
    dir: "{{.DOMAIN_DIR}}"
    cmds:
      - sea-orm-cli generate entity -u "$DATABASE_URL" -o src/entities --ignore-tables sessions,seaql_migrations --with-serde both --model-extra-derives 'utoipa::ToSchema'
    requires:
      vars: ["DATABASE_URL"]

  db:sync-entities:
    desc: Apply migrations then regenerate entities (single step, no drift window)
    cmds:
      - task: db:migrate
      - task: db:entities


  # -----------------------------------------
  # API Tasks
  # -----------------------------------------
  api:run:
    desc: Run the Rust API server
    dir: "{{.RUST_DIR}}/api"
    cmds:
      - cargo run --bin api

  # -----------------------------------------
  # Frontend Tasks (Vue + Vite)
  # -----------------------------------------
  frontend:install:
    desc: Install frontend dependencies
    dir: web
    cmds:
      - bun install

  frontend:dev-server:
    desc: Start Vite dev server (proxies /api to Rust on :3000)
    dir: web
    cmds:
      - bun run dev

  frontend:dev:
    desc: Start backend + vite dev server
    deps:
      - task: api:run
      - task: frontend:dev-server

  frontend:build:
    desc: Build Vue app for production (outputs to web/dist/)
    dir: web
    cmds:
      - bun run build

  frontend:preview:
    desc: Preview the production build
    dir: web
    cmds:
      - bun run preview

  frontend:generate:api:
    desc: Generate TypeScript types from the API's OpenAPI spec (starts backend if needed)
    dir: web
      - bun run generate:api
    requires:
      vars: ["DATABASE_URL"]


  frontend:lint:
    desc: Run TypeScript type checking
    dir: web
    cmds:
      - bunx vue-tsc -b --noEmit
