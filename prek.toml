[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "cargo-fmt", name = "cargo fmt", entry = "cargo fmt", language = "system", types_or = ["rust"], pass_filenames = false },
  { id = "cargo-fmt-check", name = "cargo fmt check", entry = "cargo fmt --check", language = "system", types_or = ["rust"], pass_filenames = false },
  { id = "cargo-clippy", name = "cargo clippy", entry = "cargo clippy --all-targets -- -D warnings", language = "system", types_or = ["rust"], pass_filenames = false, stages = ["pre-commit", "manual"] },
]
