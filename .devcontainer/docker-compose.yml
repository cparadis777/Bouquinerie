services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:z
    command: sleep infinity
    environment:
      DATABASE_URL: postgres://bouquinerie:bouquinerie@postgres:5432/bouquinerie
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bouquinerie
      POSTGRES_PASSWORD: bouquinerie
      POSTGRES_DB: bouquinerie
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bouquinerie"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
